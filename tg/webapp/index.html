<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Clicke</title>
    <link rel="stylesheet" href="webapp/css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Шапка с названием -->
        <header class="app-header">
            <h1 class="app-title">🌟 Stellar Clicke 🌟</h1>
        </header>

        <!-- Контент страницы -->
        <main id="content" class="content">
            <!-- Сюда будет загружаться страница -->
        </main>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="main">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">Главная</span>
            </button>
            <button class="nav-btn" data-page="upgrades">
                <span class="nav-icon">🚀</span>
                <span class="nav-text">Улучшения</span>
            </button>
            <button class="nav-btn" data-page="rating">
                <span class="nav-icon">🏆</span>
                <span class="nav-text">Рейтинги</span>
            </button>
            <button class="nav-btn" data-page="bonuses">
                <span class="nav-icon">🎁</span>
                <span class="nav-text">Бонусы</span>
            </button>
            <button class="nav-btn" data-page="profile">
                <span class="nav-icon">👤</span>
                <span class="nav-text">Профиль</span>
            </button>
        </nav>
    </div>

    <script src="js/telegram.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
