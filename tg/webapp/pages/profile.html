<h2 class="page-title">👤 Профиль</h2>

<!-- Информация о пользователе -->
<div class="profile-header">
    <div class="profile-avatar" id="profileAvatar">
        <img src="default-avatar.png" alt="Avatar" class="avatar-image">
    </div>
    <div class="profile-name" id="profileName">Загрузка...</div>
    <div class="profile-username" id="profileUsername">@username</div>
</div>

<!-- Достижения -->
<h3 class="section-title">🏆 Достижения</h3>
<div class="achievements-grid">
    <!-- Новичок (1000 звезд) -->
    <div class="achievement-card" id="achievementNovice">
        <img src="images/achievements/lock.png" alt="Novice" class="achievement-icon">
        <div class="achievement-name">Новичок</div>
        <div class="achievement-desc">1000 звезд</div>
    </div>

    <!-- Любитель (100000 звезд) -->
    <div class="achievement-card" id="achievementAmateur">
        <img src="images/achievements/lock.png" alt="Amateur" class="achievement-icon">
        <div class="achievement-name">Любитель</div>
        <div class="achievement-desc">100 000 звезд</div>
    </div>

    <!-- Профессионал (1000000 звезд) -->
    <div class="achievement-card" id="achievementPro">
        <img src="images/achievements/lock.png" alt="Professional" class="achievement-icon">
        <div class="achievement-name">Профессионал</div>
        <div class="achievement-desc">1 000 000 звезд</div>
    </div>
</div>

<!-- Статистика -->
<h3 class="section-title">📊 Статистика</h3>
<div class="stats-detail">
    <div class="stat-row">
        <span class="stat-label">Кликов сегодня:</span>
        <span class="stat-value" id="todayClicks">0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Кликов всего:</span>
        <span class="stat-value" id="totalClicks">0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Звезд сегодня:</span>
        <span class="stat-value" id="todayStars">0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Звезд всего:</span>
        <span class="stat-value" id="totalStars">0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">В игре с:</span>
        <span class="stat-value" id="joinDate">-</span>
    </div>
</div>

<!-- История -->
<h3 class="section-title">📜 История</h3>
<div class="history-list" id="historyList">
    <!-- Здесь будет история действий -->
    <div class="history-item">
        <span class="history-text">Начало игры</span>
        <span class="history-date">только что</span>
    </div>
</div>
