<h2 class="page-title">🎁 Ежедневные бонусы</h2>

        <div class="reward-day" data-day="3">

        <!-- День 5 -->

            <div class="day-number">День 7</div>
            <div class="reward-amount">1000 ⭐</div>
            <div class="reward-status" id="rewardDay7"></div>

    <button class="claim-button" id="claimDailyReward">Забрать награду</button>
</div>

<!-- Ежедневные миссии -->
<div class="bonus-section">

        <div class="mission-item" id="mission1">
