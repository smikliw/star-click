<!-- Счетчик звезд -->
<div class="stars-container">
    <div class="stars-counter" id="starsCounter">0</div>
</div>

<!-- x2 бонус -->
<div class="bonus-timer" id="bonusTimer">
    ✈️ x2 клик через: <span id="timerValue">10:00</span>
</div>

<!-- Кликер -->
<div class="clicker-wrapper">
    <div class="clicker-container" id="clickerContainer">
        <img src="images/star.png" alt="Clicker" class="clicker-image" id="clickerImage">
        <div class="clicker-effects" id="clickerEffects"></div>
    </div>
</div>

<!-- Энергия -->
<div class="energy-section">
    <div class="energy-info">
        <span>🔋 Энергия:</span>
        <span id="energyText">100/100</span>
    </div>
    <div class="energy-bar-container">
        <div class="energy-bar" id="energyBar" style="width: 100%"></div>
    </div>
</div>

<!-- Статистика -->
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-icon">👆</div>
        <div class="stat-label">Сила тапа</div>
        <div class="stat-value" id="tapPower">1</div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">💫</div>
        <div class="stat-label">Пассивный доход</div>
        <div class="stat-value" id="passiveIncome">0</div>
    </div>
</div>

<!-- Уведомление об окончании энергии -->
<div class="energy-warning hidden" id="energyWarning">
    ⚡ Энергия закончилась! Подождите восстановления
</div>
