<div class="app-title">🌟 Stellar Clicke 🌟</div>

<div class="profile-container">
    <div class="profile-header">
        <img src="default-avatar.png" alt="Avatar" class="profile-avatar">
        <div class="profile-name">Загрузка...</div>
    </div>

    <h3>🏆 Достижения</h3>
    <div class="achievements-grid">
        <div class="achievement-item achievement-novice">
            <img src="images/achievements/lock.png" alt="Novice" class="achievement-image">
            <div class="achievement-name">Новичок</div>
        </div>
        <div class="achievement-item achievement-amateur">
            <img src="images/achievements/lock.png" alt="Amateur" class="achievement-image">
            <div class="achievement-name">Любитель</div>
        </div>
        <div class="achievement-item achievement-professional">
            <img src="images/achievements/lock.png" alt="Professional" class="achievement-image">
            <div class="achievement-name">Профессионал</div>
        </div>
    </div>

    <h3>📊 Статистика</h3>
    <div class="stats-detail">
        <div class="stat-card">
            <div class="stat-number today-clicks">0</div>
            <div>Кликов сегодня</div>
        </div>
        <div class="stat-card">
            <div class="stat-number total-clicks">0</div>
            <div>Кликов всего</div>
        </div>
        <div class="stat-card">
            <div class="stat-number today-stars">0</div>
            <div>Звезд сегодня</div>
        </div>
        <div class="stat-card">
            <div class="stat-number total-stars">0</div>
            <div>Звезд всего</div>
        </div>
    </div>

    <h3>📜 История</h3>
    <div class="history-list"></div>
</div>
