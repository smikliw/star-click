<div class="app-title">🌟 Stellar Clicke 🌟</div>

<div class="upgrades-container">
    <h2>🚀 Космические улучшения</h2>

    <div class="balance-block">
        <div>Ваш баланс:</div>
        <div class="balance-amount">0 ⭐</div>
    </div>

    <div class="upgrade-item" data-type="tap">
        <div class="upgrade-info">
            <h3>👆 Сила тапа</h3>
            <div class="upgrade-level">Уровень: <span class="tap-level">1</span></div>
        </div>
        <div class="upgrade-price">100 ⭐</div>
    </div>

    <div class="upgrade-item" data-type="energy">
        <div class="upgrade-info">
            <h3>🔋 Энергия</h3>
            <div class="upgrade-level">Уровень: <span class="energy-level">1</span></div>
        </div>
        <div class="upgrade-price">200 ⭐</div>
    </div>

    <div class="upgrade-item" data-type="passive">
        <div class="upgrade-info">
            <h3>💫 Пассивный доход</h3>
            <div class="upgrade-level">Уровень: <span class="passive-level">0</span></div>
        </div>
        <div class="upgrade-price">500 ⭐</div>
    </div>
</div>
